<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup 2026 Sweepstakes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>World Cup 2026 Sweepstakes</h1>
  </header>

  <main>

    <div id="loading">Loading data&hellip;</div>
    <div id="error"></div>

    <!-- STANDINGS -->
    <section id="section-standings">
      <h2>Standings</h2>
      <table id="standings-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Player</th>
            <th>Total Score</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <!-- GROUP STAGE RESULTS -->
    <section id="section-results">
      <h2>Group Stage Results</h2>
      <div id="results-wrapper">
        <table id="results-table">
          <thead>
            <tr id="results-header">
              <th>Match</th>
              <th>Result</th>
              <!-- player columns injected by JS -->
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <!-- KNOCKOUT RESULTS -->
    <section id="section-knockout">
      <h2>Knockout Results</h2>
      <div id="knockout-wrapper">
        <table id="knockout-table">
          <thead>
            <tr id="knockout-header">
              <th>Match</th>
              <th>Result</th>
              <!-- player columns injected by JS -->
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <!-- SPECIAL PREDICTIONS -->
    <section id="section-special">
      <h2>Pre-Tournament Predictions</h2>
      <div id="special-wrapper">
        <table id="special-table">
          <thead>
            <tr id="special-header">
              <th>Category</th>
              <th>Actual</th>
              <!-- player columns injected by JS -->
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <!-- BRACKETS -->
    <section id="section-brackets">
      <h2>Brackets</h2>
      <table id="brackets-table">
        <thead>
          <tr>
            <th>Player</th>
            <th>Bracket</th>
          </tr>
        </thead>
        <tbody id="brackets-body"></tbody>
      </table>
    </section>

  </main>

  <script src="standings.js"></script>
</body>
</html>
